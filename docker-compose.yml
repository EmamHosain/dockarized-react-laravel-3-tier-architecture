services:
    laravel:
        build:
            context: .
            dockerfile: ./docker/php/laravel.Dockerfile
        container_name: laravel_app
        volumes:
            - ./backend:/var/www/html/laravel
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - laravel
        restart: unless-stopped

    react:
        build:
            context: .
            dockerfile: ./docker/node/react.Dockerfile
        container_name: react_app
        volumes:
            - ./frontend:/var/www/html/react
        ports:
            - "3000:3000"
        networks:
            - laravel
        restart: unless-stopped

    nginx:
        build:
            context: .
            dockerfile: ./docker/nginx/nginx.Dockerfile
        container_name: nginx_server
        ports:
            - "5000:80"
        volumes:
            - ./backend:/var/www/html/laravel
            # - ./frontend:/var/www/html/react # no need to add it 
            - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - laravel
        networks:
            - laravel
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        container_name: mysql_db
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: laravel_db
            MYSQL_USER: user
            MYSQL_PASSWORD: user123
        volumes:
            - mysql_data:/var/lib/mysql
        ports:
            - "3307:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            retries: 10
        networks:
            - laravel
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: redis_server
        networks:
            - laravel
        restart: unless-stopped

    queue:
        build:
            context: .
            dockerfile: ./docker/php/laravel.Dockerfile
        container_name: laravel_queue
        command: php artisan queue:work --tries=3 --timeout=90
        volumes:
            - ./backend:/var/www/html/laravel
        depends_on:
            - laravel
            - redis
        networks:
            - laravel
        restart: unless-stopped

    scheduler:
        build:
            context: .
            dockerfile: ./docker/php/laravel.Dockerfile
        container_name: laravel_scheduler
        command: php artisan schedule:work
        volumes:
            - ./backend:/var/www/html/laravel
        depends_on:
            - laravel
        networks:
            - laravel
        restart: unless-stopped

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: phpmyadmin
        ports:
            - "8080:80"
        environment:
            PMA_HOST: mysql
        depends_on:
            - mysql
        networks:
            - laravel

    mailhog:
        image: mailhog/mailhog
        container_name: mailhog
        ports:
            - "8050:8025"
            - "1025:1025"
        networks:
            - laravel

volumes:
    mysql_data:

networks:
    laravel:
